services:
  postgres:
    image: postgres:16-alpine
    container_name: dynamo_postgres
    environment:
      POSTGRES_USER: dynamo
      POSTGRES_PASSWORD: dynamo
      POSTGRES_DB: dynamo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dynamo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
