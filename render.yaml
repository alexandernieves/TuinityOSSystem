services:
  - type: web
    name: tuinity-backend
    runtime: node
    rootDir: backend
    plan: free            # cambiar a "starter" para producción
    region: oregon        # ajusta a la región más cercana a tus usuarios

    buildCommand: yarn install && npx prisma generate && yarn build
    startCommand: npx prisma migrate deploy && node dist/main.js

    envVars:
      - key: NODE_ENV
        value: production

      # La DATABASE_URL se inyecta automáticamente desde la BD de Render
      # Si usas la BD externa de Render, pégala manualmente en el dashboard
      - key: DATABASE_URL
        sync: false          # Se configura a mano en el dashboard de Render

      - key: JWT_SECRET
        generateValue: true  # Render genera un valor aleatorio seguro

      - key: JWT_ACCESS_TTL_SECONDS
        value: 900

      - key: JWT_REFRESH_TTL_DAYS
        value: 30

      # Redis (puedes usar Upstash gratis o Redis de Render)
      - key: REDIS_URL
        sync: false

      # AWS S3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false

      # SMTP
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # Puerto que escucha NestJS
      - key: PORT
        value: 3001
